spec: API Commons Plans 0.1
provider: Ada
providerId: ada
created: 2026-06-12
modified: 2026-06-12
reconciled: true
url: https://www.ada.cx/platform/
notes: >
  Ada does not publish public self-serve pricing tiers. Pricing is enterprise-only, sold
  through direct sales. Third-party sources and Ada's own blog indicate a conversation-based
  or resolution-based pricing model. The base enterprise contract starts around $30,000/year.
  Ada advocates for conversation-based pricing (charge per conversation handled) over
  resolution-based pricing (charge per successfully resolved conversation).

plans:
  - name: Enterprise
    type: enterprise
    description: >
      Full-platform access for large enterprises. Includes AI agent deployment, all APIs,
      analytics, compliance tools, dedicated support, and access to the Developer Toolkit
      (APIs, MCP, SDKs). Priced by sales negotiation based on conversation volume and feature set.
    quota:
      - name: Annual Contract Minimum
        description: Minimum reported annual contract value
        unit: USD/year
        limit: 30000
        metered: false
    pricing:
      - name: Per Conversation
        description: Conversation-based pricing model — charged per customer interaction handled by the AI agent, regardless of resolution outcome
        unit: USD/conversation
        low: 0.35
        high: 1.50
        metered: true
      - name: Per Resolution
        description: Resolution-based pricing model — charged only per conversation resolved by the AI agent without human escalation
        unit: USD/resolution
        low: 1.00
        high: 3.50
        metered: true
    features:
      - name: Knowledge API
        included: true
      - name: End Users API
        included: true
      - name: Conversations API
        included: true
      - name: Data Export API
        included: true
      - name: Data Compliance API
        included: true
      - name: Integrations API
        included: true
      - name: iOS SDK
        included: true
      - name: MCP Server
        included: true
      - name: Webhook Events
        included: true
      - name: Omnichannel Deployment
        included: true
      - name: Multilingual Support
        included: true
        note: May incur additional cost per language
      - name: Dedicated Account Management
        included: true
        note: Available on premium support tiers at additional cost
