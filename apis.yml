specificationVersion: '0.19'
description: 'Ada is an AI-powered customer service automation platform that enables
  enterprises to deploy AI agents capable of resolving customer inquiries across digital
  channels without human intervention. The platform exposes a suite of REST APIs for
  managing knowledge bases, end-user profiles, conversation handling, data export,
  data compliance, and external integrations. All APIs use rotatable API keys for
  authentication, return JSON, and support cursor-based pagination. Ada serves global
  brands including Pinterest, Square, Ancestry, and Zendesk, and has powered more
  than 6.4 billion customer interactions since its founding in 2016.

  '
